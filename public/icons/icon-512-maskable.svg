<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo sólido para maskable — cubre bordes incluso al recortar en círculo/estrella -->
  <rect width="512" height="512" fill="#7ba684"/>
  
  <!-- Contenido centrado con ~20% de padding seguro (safe zone) -->
  <!-- Safe zone: 102px de cada lado, contenido en 308x308 centrado -->
  <g transform="translate(102, 102)">
    <!-- Diamante (símbolo de Herbarium) — proporcional al safe zone -->
    <path d="M 154 30 
             L 278 154 
             L 154 278 
             L 30 154 Z" 
          fill="#fdfaf6" 
          opacity="0.95"/>
    <!-- H centrada dentro del diamante -->
    <text x="154" 
          y="154" 
          font-family="Georgia, serif" 
          font-size="110" 
          font-weight="300"
          fill="#7ba684" 
          text-anchor="middle" 
          dominant-baseline="middle">H</text>
  </g>
</svg>
