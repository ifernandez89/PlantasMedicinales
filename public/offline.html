<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión - Herbarium</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Georgia, serif;
      background: linear-gradient(135deg, #fdfaf6 0%, #f5f0e8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    h1 {
      font-size: 32px;
      font-weight: 300;
      color: #3d3d3d;
      margin-bottom: 12px;
    }
    
    p {
      font-size: 16px;
      color: #6b6b6b;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    button {
      background: #7ba684;
      color: #fdfaf6;
      border: none;
      padding: 12px 32px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
      font-family: inherit;
    }
    
    button:hover {
      background: #6a9573;
    }
    
    .cached-message {
      margin-top: 32px;
      padding: 16px;
      background: rgba(123, 166, 132, 0.1);
      border-radius: 8px;
      font-size: 14px;
      color: #6b6b6b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌱</div>
    <h1>Sin conexión</h1>
    <p>No hay conexión a internet en este momento. Algunas páginas que visitaste antes podrían estar disponibles.</p>
    <button onclick="window.location.href='/'">Volver al inicio</button>
    
    <div class="cached-message">
      💡 Las páginas que ya visitaste están guardadas y las podés ver sin conexión
    </div>
  </div>
  
  <script>
    // Intentar reconectar cada 5 segundos
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload();
      }
    }, 5000);
  </script>
</body>
</html>
